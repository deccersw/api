services:
  db:
    image: postgres:16-alpine
    container_name: todo-api-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-todo_api}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: postgres:16-alpine
    container_name: todo-api-migrate
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./migrations:/migrations:ro
      - ./scripts/migrate.sh:/migrate.sh:ro
    entrypoint: [ "/bin/sh", "/migrate.sh" ]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-api
    restart: unless-stopped
    depends_on:
      - db
      - migrate
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"

volumes:
  postgres_data:
